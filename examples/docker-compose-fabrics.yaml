name: mxl-example-fabrics

# Reusable RDMA configuration block to grant hardware/network access
x-rdma-settings: &rdma-settings
  network_mode: "host"
  cap_add:
    - IPC_LOCK
  ulimits:
    memlock: -1
  devices:
    - /dev/infiniband:/dev/infiniband
  shm_size: '2gb'

volumes:
  # Explicitly named to match the original mxl-example base compose file
  mxl-domain:
    name: mxl-example_mxl-domain
    driver: local
    driver_opts:
      device: none
      type: tmpfs
      o: nosuid,strictatime,uid=1000,gid=1000,mode=0755

services:
  # SERVER B: The Receiver (Target)
  fabrics-target:
    <<: *rdma-settings
    build:
      dockerfile: examples/Dockerfile
      context: ..
      target: mxl
    volumes:
      - type: volume
        source: mxl-domain
        target: /mxl-domain
      - type: bind
        source: flow-configs
        target: /home/mxl/flow-configs
    # Override the bash entrypoint from the Dockerfile
    entrypoint: ["/usr/bin/mxl-fabrics-demo"]
    command: >
      -d /mxl-domain 
      -f flow-configs/flow-video-v210.json 
      --node <RECEIVER_RDMA_IP> 
      --service 5000 
      --provider verbs

  # SERVER A: The Sender (Initiator)
  fabrics-initiator:
    <<: *rdma-settings
    build:
      dockerfile: examples/Dockerfile
      context: ..
      target: mxl
    volumes:
      - type: volume
        source: mxl-domain
        target: /mxl-domain
    # Override the bash entrypoint from the Dockerfile
    entrypoint: ["/usr/bin/mxl-fabrics-demo"]
    # Added :- to silence the empty variable warning
    command: >
      -i 
      -d /mxl-domain 
      -f 5fbec3b1-1b0f-417d-9059-8b94a47197ed 
      --node <SENDER_RDMA_IP> 
      --service 5000 
      --provider verbs 
      --target-info "${TARGET_INFO:-}"