# the device must point to a directory on the host that contains
# domain_def.json
volumes:
  mxl-domain:
    name: mxl-example_mxl-domain
    driver: local
    driver_opts:
      device: none
      type: tmpfs
      o: nosuid,strictatime,uid=1000,gid=1000,mode=0755

services:
  test-generator:
    platform: linux/amd64
    image: ghcr.io/cbcrc/test-generator:latest
    container_name: test-generator
    hostname: test-generator
    domainname: local
    ports:
      - "9600:9600"   # FastAPI serves both API and React frontend
    volumes:
      - type: volume
        source: mxl-domain
        target: /mxl-domain

  file-player:
    platform: linux/amd64
    image: ghcr.io/cbcrc/file-player:latest
    container_name: file-player
    hostname: file-player
    domainname: local
    ports:
      - "9602:9600"   # FastAPI serves both API and React frontend
    volumes:
      - type: volume
        source: mxl-domain
        target: /mxl-domain
      - ./data/Clips:/home/file:ro
    environment:
      - MXL_DOMAIN=/mxl-domain

  mxl-info-gui:
      platform: linux/amd64
      image: ghcr.io/cbcrc/mxl-info-gui:latest
      container_name: mxl-info-gui
      hostname: mxl-info-gui
      domainname: local
      ports:
      - "9699:9600"   # FastAPI serves both API and React frontend
      volumes:
        - type: volume
          source: mxl-domain
          target: /mxl-domain
      environment:
      - MXL_DOMAIN=/mxl-domain

  # MediaMTX must use host networking so WebRTC ICE candidates reflect the real
  # host IP.  All ports (8554 RTSP, 8889 WebRTC) are bound directly on the host.
  mediamtx:
    platform: linux/amd64
    image: bluenviron/mediamtx:latest
    container_name: mediamtx
    hostname: mediamtx
    network_mode: host

  mxl2webrtc:
    platform: linux/amd64
    image: ghcr.io/cbcrc/mxl2webrtc:latest
    container_name: mxl2webrtc
    hostname: mxl2webrtc
    domainname: local
    ports:
      - "9601:9600"   # FastAPI serves both API and React frontend; change host port freely
    volumes:
      - type: volume
        source: mxl-domain
        target: /mxl-domain
    environment:
      - MXL_DOMAIN=/mxl-domain
      # host.docker.internal resolves to the Docker bridge gateway on Linux when
      # extra_hosts is set; mediamtx binds directly on the host via network_mode: host
      - MEDIAMTX_WHIP_URL=http://host.docker.internal:8889/mxl2webrtc/whip
      - MEDIAMTX_WEBRTC_URL=http://localhost:8889
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - mediamtx